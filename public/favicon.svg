<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#a066ff"/>
      <stop offset="1" stop-color="#6620cc"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>

  <!-- Main pad -->
  <ellipse cx="32" cy="46" rx="13" ry="10" fill="white" fill-opacity="0.92"/>

  <!-- Outer toe pads — angled outward -->
  <ellipse cx="12" cy="27" rx="5" ry="6" fill="white" fill-opacity="0.92" transform="rotate(-15 12 27)"/>
  <ellipse cx="52" cy="27" rx="5" ry="6" fill="white" fill-opacity="0.92" transform="rotate(15 52 27)"/>

  <!-- Inner toe pads — nearly upright -->
  <ellipse cx="24" cy="17" rx="5" ry="6.5" fill="white" fill-opacity="0.92" transform="rotate(-5 24 17)"/>
  <ellipse cx="40" cy="17" rx="5" ry="6.5" fill="white" fill-opacity="0.92" transform="rotate(5 40 17)"/>
</svg>
